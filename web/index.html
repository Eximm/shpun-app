<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShpunApp" />

    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <title>ShpunApp</title>
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var raw = String(window.location.search || "") + String(window.location.hash || "");
          var ua = String(window.navigator && window.navigator.userAgent || "");
          var isTelegram = /Telegram/i.test(ua) || /tgWebApp(Data|Version|Platform)=/i.test(raw);
          if (!isTelegram) return;
          document.write('<script src="https://telegram.org/js/telegram-web-app.js"><\/script>');
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
