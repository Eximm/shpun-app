server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/mime.types;

  types {
    application/manifest+json  webmanifest;
    application/javascript     mjs;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  # ---------------------------------------------
  # HTML / App Shell: NEVER cache
  # ---------------------------------------------
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri =404;
  }

  location = / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files /index.html =404;
  }

  # ---------------------------------------------
  # PWA critical files: ALWAYS fresh
  # ---------------------------------------------
  location = /sw.mjs {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  location ~* ^/workbox-.*\.(?:js|mjs)$ {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # ---------------------------------------------
  # Versioned assets: cache forever
  # ---------------------------------------------
  location ^~ /assets/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /icons/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot|ogg)$ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # ---------------------------------------------
  # SPA fallback (React Router) + NEVER cache HTML
  # ---------------------------------------------
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;

    try_files $uri $uri/ /index.html;
  }
}