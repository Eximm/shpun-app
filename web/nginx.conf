server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ---------------------------------------------------------
  # MIME types (важно для .webmanifest и .mjs)
  # ---------------------------------------------------------
  include /etc/nginx/mime.types;

  # На некоторых системах нет правильного mapping для webmanifest/mjs
  types {
    application/manifest+json  webmanifest;
    application/javascript     mjs;
  }

  # ---------------------------------------------------------
  # Security / sane defaults
  # ---------------------------------------------------------
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # (Опционально) если всё приложение в одном домене и без iframes
  add_header X-Frame-Options "SAMEORIGIN" always;

  # ---------------------------------------------------------
  # 1) HTML / App Shell: NEVER cache
  #    (иначе можно залипнуть на старом index.html)
  # ---------------------------------------------------------
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri =404;
  }

  location = / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files /index.html =404;
  }

  # ---------------------------------------------------------
  # 2) PWA critical files: ALWAYS fresh (no cache)
  # ---------------------------------------------------------
  # В твоём случае выходной SW = /sw.mjs (vite-plugin-pwa injectManifest)
  location = /sw.mjs {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Если когда-нибудь будет /sw.js — пусть тоже будет свежим
  location = /sw.js {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # Workbox вспомогательные файлы (если появятся)
  location ~* ^/workbox-.*\.(?:js|mjs)$ {
    add_header Cache-Control "no-store, max-age=0" always;
    expires -1;
    try_files $uri =404;
  }

  # ---------------------------------------------------------
  # 3) Versioned assets: cache forever (hashed filenames)
  # ---------------------------------------------------------
  location ^~ /assets/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /icons/ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Прочая статика: тоже можно кэшировать долго
  location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot|ogg)$ {
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # ---------------------------------------------------------
  # 4) SPA fallback (React Router)
  # ---------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}