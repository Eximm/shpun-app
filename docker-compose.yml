services:
  shpun-app-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: shpun-app-shpun-app-api
    container_name: shpun-app-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:3000"
    volumes:
      - /opt/shpun-app/data:/data:rw
    env_file:
      - /opt/shpun-app/.env
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      DATA_DIR: "/data"
      LINKDB_PATH: "/data/linkdb.sqlite"
      RECEIPTS_DIR: "/data/receipts"
    networks:
      - shpun-app
      - shm_default

  shpun-app-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_TG_BOT_USERNAME: ${VITE_TG_BOT_USERNAME}
        VITE_TG_APP_SHORTNAME: ${VITE_TG_APP_SHORTNAME}
        VITE_TG_STARTAPP: ${VITE_TG_STARTAPP}
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
    image: shpun-app-shpun-app-web
    container_name: shpun-app-web
    restart: unless-stopped
    depends_on:
      - shpun-app-api
    ports:
      - "127.0.0.1:8090:80"
    env_file:
      - /opt/shpun-app/.env
    networks:
      - shpun-app

networks:
  shpun-app:
    name: shpun-app
  shm_default:
    external: true